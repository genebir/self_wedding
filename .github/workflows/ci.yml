name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: malgeum
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: malgeum
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U malgeum"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
    env:
      MALGEUM_DATABASE_URL: postgresql+psycopg://malgeum:ci@localhost:5432/malgeum
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements-dev.txt
      - run: python -m pytest tests -q
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
